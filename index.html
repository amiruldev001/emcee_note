<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Calculator PWA</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

</head>
<body>

<div class="container">
    <h2>🚗 Loan Calculator</h2>

    <input type="number" id="price" placeholder="Harga Kereta (RM)">
    <input type="number" id="dp" placeholder="Down Payment (%)">
    <input type="number" id="rate" placeholder="Interest (%)">
<label>Jenis Interest</label>
<div class="radio-group">
    <label>
        <input type="radio" name="interestType" value="reducing" checked>
        Reducing Balance
    </label>
    <label>
        <input type="radio" name="interestType" value="flat">
        Fixed / Flat Rate
    </label>
</div>

    <select id="years">
        <option value="3">3 Tahun</option>
        <option value="5">5 Tahun</option>
        <option value="7">7 Tahun</option>
        <option value="9">9 Tahun</option>
    </select>

    <button onclick="calculate()">KIRA</button>

    <div id="result"></div>

    <h3>📊 Jadual Bayaran</h3>
    <div class="table-container">
        <table id="schedule">
            <thead>
                <tr>
                    <th>Bulan</th>
                    <th>Bayaran</th>
                    <th>Interest</th>
                    <th>Principal</th>
                    <th>Baki</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
