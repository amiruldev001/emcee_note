<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Calculator</title>

<link rel="manifest" href="manifest.json">

<style>

/* GLOBAL FIX */
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
}

/* HEADER */
.header {
    padding: 20px;
    font-size: 22px;
    font-weight: bold;
}

/* CARD */
.card {
    background: #1e293b;
    margin: 15px;
    padding: 20px;
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* FLOATING INPUT */
.input-group {
    position: relative;
    margin-top: 15px;
}

.input-group input,
.input-group select {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: #334155;
    color: white;
    outline: none;
}

/* LABEL */
.input-group label {
    position: absolute;
    left: 14px;
    top: 14px;
    font-size: 14px;
    color: #94a3b8;
    transition: 0.2s ease;
    pointer-events: none;
}

/* FLOAT EFFECT */
.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label,
.input-group select:focus + label {
    top: -8px;
    left: 10px;
    font-size: 11px;
    background: #1e293b;
    padding: 2px 6px;
    border-radius: 6px;
    color: #22c55e;
}

/* RADIO BUTTON */
.radio-group {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

.radio-group label {
    flex: 1;
    background: #334155;
    padding: 12px;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
}

.radio-group input {
    display: none;
}

.radio-group input:checked + span {
    background: #22c55e;
    display: block;
    border-radius: 10px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    margin-top: 20px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(90deg, #22c55e, #16a34a);
    color: white;
    font-weight: bold;
    font-size: 16px;
    transition: 0.2s;
}

button:active {
    transform: scale(0.96);
}

/* RESULT */
.result {
    margin-top: 15px;
    background: #0f172a;
    padding: 15px;
    border-radius: 12px;
}

.result div {
    display: flex;
    justify-content: space-between;
    margin: 6px 0;
}

.highlight {
    font-size: 20px;
    font-weight: bold;
    color: #22c55e;
}

/* TABLE */
.table-container {
    max-height: 250px;
    overflow-y: auto;
    margin-top: 10px;
}

table {
    width: 100%;
    font-size: 12px;
    border-collapse: collapse;
}

th {
    background: #22c55e;
    padding: 6px;
}

td {
    padding: 5px;
    text-align: center;
}

/* SMOOTH SCROLL */
html {
    scroll-behavior: smooth;
}

</style>
</head>

<body>

<div class="header">🚗 Loan Calculator</div>

<div class="card">

    <div class="input-group">
        <input type="number" id="price" placeholder=" ">
        <label>Harga Kereta (RM)</label>
    </div>

    <div class="input-group">
        <input type="number" id="dp" placeholder=" ">
        <label>Down Payment (% atau RM)</label>
    </div>

    <div class="input-group">
        <input type="number" id="rate" placeholder=" ">
        <label>Interest (%)</label>
    </div>

    <div class="input-group">
        <select id="years">
            <option value="3">3 Tahun</option>
            <option value="5">5 Tahun</option>
            <option value="7">7 Tahun</option>
            <option value="9">9 Tahun</option>
        </select>
        <label>Tempoh Pinjaman</label>
    </div>

    <div class="radio-group">
        <label>
            <input type="radio" name="interestType" value="reducing" checked>
            <span>Reducing</span>
        </label>
        <label>
            <input type="radio" name="interestType" value="flat">
            <span>Flat</span>
        </label>
    </div>

    <button onclick="calculate()">KIRA</button>

    <div class="result" id="result"></div>

</div>

<div class="card">
    <h3>📊 Jadual Bayaran</h3>
    <div class="table-container">
        <table id="schedule">
            <thead>
                <tr>
                    <th>Bulan</th>
                    <th>Bayar</th>
                    <th>Interest</th>
                    <th>Principal</th>
                    <th>Baki</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
